<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-label="스탯창 장착 아이템 영역 샘플">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b261f"/>
      <stop offset="0.55" stop-color="#171410"/>
      <stop offset="1" stop-color="#0b0907"/>
    </linearGradient>
    <linearGradient id="slot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33291c"/>
      <stop offset="0.45" stop-color="#16110b"/>
      <stop offset="1" stop-color="#070504"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#79e8ff"/>
      <stop offset="0.55" stop-color="#2f7cff"/>
      <stop offset="1" stop-color="#1f2c7a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <style>
      .title { font: 700 26px "Malgun Gothic", "Noto Sans KR", sans-serif; fill: #f4d884; }
      .section { font: 700 17px "Malgun Gothic", "Noto Sans KR", sans-serif; fill: #d2b265; letter-spacing: 0; }
      .label { font: 700 16px "Malgun Gothic", "Noto Sans KR", sans-serif; fill: #f7e9be; text-anchor: middle; }
      .hint { font: 500 14px "Malgun Gothic", "Noto Sans KR", sans-serif; fill: #b8a27a; }
      .slot { fill: url(#slot); stroke: #765d32; stroke-width: 4; }
      .slotInner { fill: none; stroke: #c59b45; stroke-width: 1.5; opacity: 0.75; }
      .special { stroke: #9a7132; }
      .future { fill: #100d0a; stroke: #5e5140; stroke-width: 3; stroke-dasharray: 8 7; }
      .iconStroke { fill: none; stroke: #bfa26a; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="920" height="420" fill="#070604"/>
  <rect x="44" y="34" width="832" height="352" rx="14" fill="url(#panel)" stroke="#5f4b2b" stroke-width="5" filter="url(#softShadow)"/>
  <rect x="62" y="52" width="796" height="316" rx="8" fill="none" stroke="#a78341" stroke-width="1.5" opacity="0.8"/>
  <text x="460" y="86" class="title" text-anchor="middle">스탯창 장착 아이템 영역 샘플</text>
  <text x="460" y="113" class="hint" text-anchor="middle">2행 구조: 기본 장비는 위, 특수 슬롯은 아래 / 보석을 두 번째 줄 첫 칸으로 배치</text>

  <text x="96" y="153" class="section">기본 장비</text>
  <text x="96" y="274" class="section">특수 슬롯</text>

  <g transform="translate(108 165)">
    <g>
      <rect class="slot" x="0" y="0" width="96" height="78" rx="6"/>
      <rect class="slotInner" x="8" y="8" width="80" height="62" rx="3"/>
      <path class="iconStroke" d="M48 17 L61 52 L48 62 L35 52 Z"/>
      <text class="label" x="48" y="97">무기</text>
    </g>
    <g transform="translate(116 0)">
      <rect class="slot" x="0" y="0" width="96" height="78" rx="6"/>
      <rect class="slotInner" x="8" y="8" width="80" height="62" rx="3"/>
      <circle cx="48" cy="39" r="19" fill="none" stroke="#bfa26a" stroke-width="4"/>
      <text class="label" x="48" y="97">목걸이</text>
    </g>
    <g transform="translate(232 0)">
      <rect class="slot" x="0" y="0" width="96" height="78" rx="6"/>
      <rect class="slotInner" x="8" y="8" width="80" height="62" rx="3"/>
      <path class="iconStroke" d="M42 20 C31 34 33 51 48 61 C63 51 65 34 54 20"/>
      <text class="label" x="48" y="97">귀걸이1</text>
    </g>
    <g transform="translate(348 0)">
      <rect class="slot" x="0" y="0" width="96" height="78" rx="6"/>
      <rect class="slotInner" x="8" y="8" width="80" height="62" rx="3"/>
      <path class="iconStroke" d="M42 20 C31 34 33 51 48 61 C63 51 65 34 54 20"/>
      <text class="label" x="48" y="97">귀걸이2</text>
    </g>
    <g transform="translate(464 0)">
      <rect class="slot" x="0" y="0" width="96" height="78" rx="6"/>
      <rect class="slotInner" x="8" y="8" width="80" height="62" rx="3"/>
      <circle cx="48" cy="42" r="16" fill="none" stroke="#bfa26a" stroke-width="5"/>
      <text class="label" x="48" y="97">반지1</text>
    </g>
    <g transform="translate(580 0)">
      <rect class="slot" x="0" y="0" width="96" height="78" rx="6"/>
      <rect class="slotInner" x="8" y="8" width="80" height="62" rx="3"/>
      <circle cx="48" cy="42" r="16" fill="none" stroke="#bfa26a" stroke-width="5"/>
      <text class="label" x="48" y="97">반지2</text>
    </g>
  </g>

  <g transform="translate(108 286)">
    <g>
      <rect class="slot special" x="0" y="0" width="96" height="78" rx="6"/>
      <rect class="slotInner" x="8" y="8" width="80" height="62" rx="3"/>
      <path d="M48 15 L70 37 L48 64 L26 37 Z" fill="url(#gem)" stroke="#bcefff" stroke-width="3"/>
      <path d="M32 37 H64 M48 15 L41 37 L48 64 L55 37 Z" fill="none" stroke="#d8f8ff" stroke-width="1.5" opacity="0.85"/>
      <text class="label" x="48" y="97">보석</text>
    </g>
    <g transform="translate(116 0)">
      <rect class="slot special" x="0" y="0" width="96" height="78" rx="6"/>
      <rect class="slotInner" x="8" y="8" width="80" height="62" rx="3"/>
      <path class="iconStroke" d="M31 56 C36 31 43 21 48 17 C53 21 60 31 65 56 Z"/>
      <text class="label" x="48" y="97">엘릭서</text>
    </g>
    <g transform="translate(232 0)">
      <rect class="slot special" x="0" y="0" width="96" height="78" rx="6"/>
      <rect class="slotInner" x="8" y="8" width="80" height="62" rx="3"/>
      <path class="iconStroke" d="M25 43 C35 26 61 26 71 43 M30 43 V58 H66 V43"/>
      <text class="label" x="48" y="97">팔찌</text>
    </g>
    <g transform="translate(348 0)">
      <rect class="slot special" x="0" y="0" width="96" height="78" rx="6"/>
      <rect class="slotInner" x="8" y="8" width="80" height="62" rx="3"/>
      <rect x="31" y="18" width="34" height="44" rx="3" fill="none" stroke="#bfa26a" stroke-width="4"/>
      <path d="M36 27 H60 M36 36 H60 M36 45 H54" stroke="#bfa26a" stroke-width="3" stroke-linecap="round"/>
      <text class="label" x="48" y="97">카드</text>
    </g>
    <g transform="translate(464 0)">
      <rect class="future" x="0" y="0" width="96" height="78" rx="6"/>
      <text x="48" y="45" class="label" fill="#a9936b">+</text>
      <text class="label" x="48" y="97" fill="#b8a27a">특수</text>
    </g>
    <g transform="translate(580 0)">
      <rect class="future" x="0" y="0" width="96" height="78" rx="6"/>
      <text x="48" y="45" class="label" fill="#a9936b">...</text>
      <text class="label" x="48" y="97" fill="#b8a27a">확장</text>
    </g>
  </g>
</svg>
